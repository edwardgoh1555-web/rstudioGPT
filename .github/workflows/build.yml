name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allows manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Windows
        run: npm run build:win
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeIntelligence-Windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build macOS
        run: npm run build:mac
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeIntelligence-macOS
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Linux
        run: npm run build:linux
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeIntelligence-Linux
          path: dist/*.AppImage
